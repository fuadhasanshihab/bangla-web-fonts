name: Generate Font Previews

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libpangocairo-1.0-0 woff2 fontconfig

      - name: Generate font preview images
        run: |
          FONT_DIR="./public/fonts"

          for dir in $(find $FONT_DIR -mindepth 1 -maxdepth 1 -type d); do
            FONT_WOFF2=$(find $dir -type f -name "*.woff2" | head -n 1)

            if [ -z "$FONT_WOFF2" ]; then
              echo "No .woff2 font file in $dir"
              continue
            fi

            # Convert WOFF2 to TTF
            woff2_decompress "$FONT_WOFF2"
            FONT_TTF="${FONT_WOFF2%.woff2}.ttf"

            if [ ! -f "$FONT_TTF" ]; then
              echo "Failed to decompress $FONT_WOFF2"
              continue
            fi

            FONT_NAME=$(basename "$dir")
            OUTPUT_FILE="$dir/font-preview.png"

            # Generate image with pango
            convert -background white -size 1280x720 \
              "pango:<markup><span font_family='$FONT_NAME' size='72000' weight='bold'>$FONT_NAME</span>\n\n<span font_family='$FONT_NAME' size='48000'>আমার সোনার বাংলা, আমি তোমায় ভালোবাসি</span>\n\n<span font_family='$FONT_NAME' size='24000' foreground='gray'>banglawebfonts.pages.dev</span></markup>" \
              "$OUTPUT_FILE"
          done

      - name: Commit and push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Generate font preview images"
          git push https://github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
