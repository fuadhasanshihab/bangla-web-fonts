name: Generate Font Previews

on:
  workflow_dispatch: # This allows the workflow to be manually triggered

jobs:
  generate-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install dependencies
        run: |
          npm install canvas

      - name: Generate Font Preview Images
        run: |
          const fs = require('fs');
          const path = require('path');
          const { createCanvas, registerFont } = require('canvas');

          // Get all font directories in the public/fonts/ directory
          const fontsDirectory = './public/fonts';
          const fontDirs = fs.readdirSync(fontsDirectory, { withFileTypes: true })
            .filter(dir => dir.isDirectory())
            .map(dir => dir.name);

          // Function to generate preview for a given font directory
          const generatePreview = (fontDir) => {
            const fontPath = path.join(fontsDirectory, fontDir);
            const fontFile = fs.readdirSync(fontPath).find(file => file.endsWith('.woof2'));

            if (!fontFile) {
              console.log(`No .woof2 font file found in ${fontPath}`);
              return;
            }

            const fontFilePath = path.join(fontPath, fontFile);
            const previewImagePath = path.join(fontPath, 'font-preview.png');

            // Register font (make sure to use the correct font file path if necessary)
            registerFont(fontFilePath, { family: fontDir });

            // Set up canvas with 16:9 aspect ratio
            const width = 1280;
            const height = 720;
            const canvas = createCanvas(width, height);
            const ctx = canvas.getContext('2d');

            // Set the font and draw text
            ctx.font = '48px ' + fontDir;
            ctx.fillStyle = '#000'; // Text color
            ctx.fillText('The quick brown fox jumps over the lazy dog', 50, 150);

            // Save the preview image to the directory
            const buffer = canvas.toBuffer('image/png');
            fs.writeFileSync(previewImagePath, buffer);
            console.log(`Generated preview for ${fontDir}`);
          };

          // Loop over all font directories and generate previews
          fontDirs.forEach(fontDir => generatePreview(fontDir));

      - name: Commit and push images
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Generate font preview images"
          git push
