name: Generate Font Previews

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install canvas

      - name: Generate Font Previews
        run: |
          mkdir -p scripts
          cat > scripts/generate-preview.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const { createCanvas, registerFont } = require('canvas');

          const publicFontsDir = path.join(__dirname, '..', 'public', 'fonts');
          const demoText = "আমার সোনার বাংলা, আমি তোমায় ভালোবাসি";
          const siteUrl = "banglawebfonts.pages.dev";

          const width = 1280;
          const height = 720;

          function capitalizeName(name) {
            return name
              .split('-')
              .map(w => w.charAt(0).toUpperCase() + w.slice(1))
              .join(' ');
          }

          function findWoff2File(dir) {
            const files = fs.readdirSync(dir);
            return files.find(file => file.endsWith('.woff2'));
          }

          const fontDirs = fs.readdirSync(publicFontsDir).filter(f => {
            return fs.statSync(path.join(publicFontsDir, f)).isDirectory();
          });

          for (const fontDir of fontDirs) {
            const fontPath = path.join(publicFontsDir, fontDir);
            const woff2File = findWoff2File(fontPath);
            if (!woff2File) {
              console.log(`No .woff2 found in ${fontDir}`);
              continue;
            }

            const fontFullPath = path.join(fontPath, woff2File);

            // Register the font
            registerFont(fontFullPath, { family: fontDir });

            // Create canvas
            const canvas = createCanvas(width, height);
            const ctx = canvas.getContext('2d');

            // White background
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, width, height);

            // Draw font name
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 48px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(capitalizeName(fontDir), width / 2, 100);

            // Draw demo text
            ctx.font = `bold 64px "${fontDir}"`;
            ctx.fillText(demoText, width / 2, height / 2);

            // Draw site url
            ctx.font = '24px sans-serif';
            ctx.fillText(siteUrl, width / 2, height - 50);

            // Save to file
            const outPath = path.join(fontPath, 'font-preview.png');
            const buffer = canvas.toBuffer('image/png');
            fs.writeFileSync(outPath, buffer);

            console.log(`Generated preview for ${fontDir}`);
          }
          EOF

          node scripts/generate-preview.js

      - name: Commit and push previews
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add public/fonts/**/font-preview.png
          git commit -m "Generate font preview images"
          git push https://github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
