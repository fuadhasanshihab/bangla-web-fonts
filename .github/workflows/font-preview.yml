name: Generate Font Previews

on:
  workflow_dispatch:  # Allows for manual triggering

permissions:
  contents: write  # Grant write access to repository contents

jobs:
  generate-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install ImageMagick and Pango
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libpangocairo-1.0-0

      - name: Generate Font Preview Images
        run: |
          # Set the base fonts directory
          FONT_DIR="./public/fonts"
          
          # Loop through each font directory
          for dir in $(find $FONT_DIR -type d); do
            FONT_FILE=$(find $dir -type f -name "*.woff2" | head -n 1)  # Find the .woff2 font file
            if [ -z "$FONT_FILE" ]; then
              echo "No .woff2 font file found in $dir"
              continue
            fi

            # Set output preview file path
            OUTPUT_FILE="$dir/font-preview.png"

            # Generate the font preview image using ImageMagick
            convert -background white -size 1280x720 \
            "pango:<markup><span font_family='$FONT_NAME' size='72000' weight='bold'>$FONT_NAME</span>\n\n<span font_family='$FONT_NAME' size='48000'>আমার সোনার বাংলা, আমি তোমায় ভালোবাসি</span>\n\n<span font_family='$FONT_NAME' size='24000' foreground='gray'>banglawebfonts.pages.dev</span></markup>" \
            "$OUTPUT_FILE"

            
            echo "Preview generated for $dir"
          done

      - name: Commit and push images
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Generate font preview images"
          git push https://github.com/${{ github.repository }}.git HEAD:${{ github.ref }} 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
