name: Generate Font Previews

on:
  workflow_dispatch:  # Allows for manual triggering

permissions:
  contents: write  # Grant write access to repository contents

jobs:
  generate-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl woff2
          pip install pillow  # Install Pillow for image manipulation

      - name: Convert .woff2 to .ttf
        run: |
          # Set the font directory
          FONT_DIR="./public/fonts"
          
          # Create a directory to store converted fonts
          mkdir -p ./converted_fonts

          # Convert each .woff2 font to .ttf
          for font_file in $(find $FONT_DIR -type f -name "*.woff2"); do
            # Get the base font name without extension
            FONT_NAME=$(basename "$font_file" .woff2)
            
            # Convert .woff2 to .ttf using the woff2 tool
            woff2_decompress "$font_file" -o "./converted_fonts/${FONT_NAME}.ttf"
            echo "Converted $font_file to ./converted_fonts/${FONT_NAME}.ttf"
          done

      - name: Generate Font Preview Images with Pillow
        run: |
          FONT_DIR="./public/fonts"
          CONVERTED_FONT_DIR="./converted_fonts"
          
          # Loop through each converted font file
          for font_file in $(find $CONVERTED_FONT_DIR -type f -name "*.ttf"); do
            FONT_NAME=$(basename "$font_file" | sed 's/\.[^.]*$//')  # Get the font name without extension
            OUTPUT_FILE="./public/fonts/${FONT_NAME}-preview.png"  # Output file for each font

            # Create the Python script to generate font previews using Pillow
            cat > generate_preview.py <<EOF
              from PIL import Image, ImageDraw, ImageFont

              # Set font and text
              font_path = "$font_file"
              text = "আমার সোনার বাংলা, আমি তোমায় ভালোবাসি"
              output_file = "$OUTPUT_FILE"

              # Create image
              image = Image.new("RGB", (1280, 720), (255, 255, 255))
              draw = ImageDraw.Draw(image)

              # Load font and set size
              font = ImageFont.truetype(font_path, 48)

              # Draw text on the image
              draw.text((50, 150), font_path.split("/")[-1].replace(".ttf", "") + " Font", font=font, fill="black")
              draw.text((50, 250), text, font=font, fill="black")
              draw.text((50, 350), "banglawebfonts.pages.dev", font=font, fill="gray")

              # Save the image
              image.save(output_file)
            EOF

            # Run the Python script for each font
            python generate_preview.py

          # Move the generated images to the correct directory
          mv *.png ./public/fonts/

      - name: Commit and push images
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Generate font preview images"
          git push https://github.com/${{ github.repository }}.git HEAD:${{ github.ref }} 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
