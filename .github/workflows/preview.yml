name: Generate Font Previews

on:
  workflow_dispatch:

jobs:
  generate-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install canvas
          sudo apt-get install -y woff2  # Install the woff2 conversion tool

      - name: Convert .woff2 to .ttf
        run: |
          # Find all the .woff2 files in the public/fonts directory and convert them to .ttf
          find ./public/fonts -type f -name "*.woff2" | while read woff2file; do
            # Convert .woff2 to .ttf using the woff2 tool
            ttf_file="${woff2file%.woff2}.ttf"
            woff2_decompress "$woff2file" && mv "${woff2file%.woff2}.ttf" "$ttf_file"
            echo "Converted $woff2file to $ttf_file"
          done

      - name: Create script file for generating previews
        run: |
          cat << 'EOF' > generate-previews.cjs
          const fs = require('fs');
          const path = require('path');
          const { createCanvas, registerFont } = require('canvas');

          const fontsDirectory = './public/fonts';
          const fontDirs = fs.readdirSync(fontsDirectory, { withFileTypes: true })
            .filter(dir => dir.isDirectory())
            .map(dir => dir.name);

          const generatePreview = (fontDir) => {
            const fontPath = path.join(fontsDirectory, fontDir);
            const fontFile = fs.readdirSync(fontPath).find(file => file.endsWith('.ttf'));  // Now looking for .ttf files

            if (!fontFile) {
              console.log(`No .ttf font file found in ${fontPath}`);
              return;
            }

            const fontFilePath = path.join(fontPath, fontFile);
            const previewImagePath = path.join(fontPath, 'font-preview.png');

            registerFont(fontFilePath, { family: fontDir });

            const width = 1280;
            const height = 720;
            const canvas = createCanvas(width, height);
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, width, height); // white background
            ctx.fillStyle = '#000';
            ctx.font = '48px "' + fontDir + '"';
            ctx.fillText('The quick brown fox jumps over the lazy dog', 50, 150);

            const buffer = canvas.toBuffer('image/png');
            fs.writeFileSync(previewImagePath, buffer);
            console.log(`Generated preview for ${fontDir}`);
          };

          fontDirs.forEach(fontDir => generatePreview(fontDir));
          EOF

      - name: Run the script
        run: |
          node generate-previews.cjs

      - name: Commit and push images
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Generate font preview images"
          git push
