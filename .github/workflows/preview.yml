name: Generate Font Previews

on:
  workflow_dispatch:

jobs:
  generate-previews:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install canvas
          
      - name: Create script file for generating previews
        run: |
          cat << 'EOF' > generate-previews.cjs
          const fs = require('fs');
          const path = require('path');
          const { createCanvas, loadImage } = require('canvas');

          // The CDN link where fonts are hosted
          const cdnFontCss = "https://banglawebfonts.pages.dev/css/webfonts.min.css";  // Your CDN URL for fonts

          // Function to format the font-family names (capitalized and no hyphens)
          const formatFontFamily = (fontName) => {
            return fontName
              .split('-')
              .map(word => word.charAt(0).toUpperCase() + word.slice(1))
              .join(' ');
          };

          const fontsDirectory = './public/fonts';
          const fontDirs = fs.readdirSync(fontsDirectory, { withFileTypes: true })
            .filter(dir => dir.isDirectory())
            .map(dir => dir.name);

          const generatePreview = (fontDir) => {
            const fontFamily = formatFontFamily(fontDir);  // Format font family for the preview text
            const fontPath = path.join(fontsDirectory, fontDir);
            const previewImagePath = path.join(fontPath, 'font-preview.png');

            // Create canvas and context
            const width = 1280;
            const height = 720;
            const canvas = createCanvas(width, height);
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, width, height); // white background

            // Use the formatted font-family from the CDN CSS
            ctx.fillStyle = '#000';
            ctx.font = `48px "${fontFamily}"`;  // Use the formatted font-family
            ctx.fillText('The quick brown fox jumps over the lazy dog', 50, 150);

            const buffer = canvas.toBuffer('image/png');
            fs.writeFileSync(previewImagePath, buffer);
            console.log(`Generated preview for ${fontFamily}`);
          };

          fontDirs.forEach(fontDir => generatePreview(fontDir));
          EOF

      - name: Run the script
        run: |
          node generate-previews.cjs

      - name: Commit and push images
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Generate font preview images"
          git push
